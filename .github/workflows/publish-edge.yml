name: 发布至 Edge Add-ons

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '要发布的版本 tag（留空则使用最新 Release）'
        required: false
        default: ''

jobs:
  publish-edge:
    name: 发布至 Edge Add-ons 商店
    runs-on: ubuntu-latest
    env:
      EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      API_ENDPOINT: https://api.addons.microsoftedge.microsoft.com

    steps:
      - name: 检查 Edge API 凭据
        run: |
          if [ -z "$EDGE_CLIENT_ID" ] || [ -z "$EDGE_API_KEY" ] || [ -z "$EDGE_PRODUCT_ID" ]; then
            echo "::error::Edge Add-ons API 凭据未配置，请在仓库 Secrets 中设置 EDGE_CLIENT_ID、EDGE_API_KEY、EDGE_PRODUCT_ID"
            exit 1
          fi

      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 确定目标版本
        id: version
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh release list --limit 1 --json tagName --jq '.[0].tagName')
          fi
          if [ -z "$TAG" ]; then
            echo "::error::未找到可用的 Release"
            exit 1
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "目标版本: $TAG"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载 Release 的 zip 包
        run: |
          mkdir -p release
          gh release download "${{ steps.version.outputs.tag }}" \
            --pattern "*.zip" \
            --dir release \
            --clobber
          echo "下载的文件:"
          ls -la release/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传扩展包至 Edge Add-ons
        id: upload
        run: |
          # 排除 -crx.zip（Chrome 专用包），选择标准 .zip
          ZIP_FILE=$(ls release/*.zip 2>/dev/null | grep -v '\-crx\.zip$' | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::未找到 .zip 包（排除 -crx.zip）"
            ls release/
            exit 1
          fi
          echo "上传文件: $ZIP_FILE"

          # 一次请求：-D 写响应头到文件，-o 写响应体到文件
          curl -s -D /tmp/upload_headers.txt -o /tmp/upload_body.txt \
            -H "Authorization: ApiKey $EDGE_API_KEY" \
            -H "X-ClientID: $EDGE_CLIENT_ID" \
            -H "Content-Type: application/zip" \
            -X POST \
            -T "$ZIP_FILE" \
            "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions/draft/package"

          # 取最后一个 HTTP 状态行（跳过 100 Continue）
          HTTP_CODE=$(grep '^HTTP/' /tmp/upload_headers.txt | tail -1 | awk '{print $2}' | tr -d '\r')
          echo "HTTP 状态码: $HTTP_CODE"

          if [ "$HTTP_CODE" = "202" ]; then
            OPERATION_ID=$(grep -i "^Location:" /tmp/upload_headers.txt \
              | sed 's|.*operations/||' \
              | tr -d '\r\n[:space:]')

            if [ -z "$OPERATION_ID" ]; then
              echo "::error::上传成功但未获取到 operationID"
              cat /tmp/upload_headers.txt
              exit 1
            fi
            echo "operation_id=$OPERATION_ID" >> $GITHUB_OUTPUT
            echo "上传已接受，operationID: $OPERATION_ID"
          else
            echo "::error::上传失败 HTTP $HTTP_CODE"
            cat /tmp/upload_body.txt
            exit 1
          fi

      - name: 等待上传处理完成
        run: |
          OPERATION_ID="${{ steps.upload.outputs.operation_id }}"
          MAX_RETRIES=20
          RETRY_INTERVAL=5

          for i in $(seq 1 $MAX_RETRIES); do
            echo "检查上传状态 ($i/$MAX_RETRIES)..."
            STATUS_RESPONSE=$(curl -s \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions/draft/package/operations/$OPERATION_ID")

            echo "响应: $STATUS_RESPONSE"
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // empty')
            echo "状态: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "上传处理完成"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "::error::上传处理失败: $STATUS_RESPONSE"
              exit 1
            fi

            sleep $RETRY_INTERVAL
          done

          echo "::warning::上传状态轮询超时，但上传可能已成功，继续提交发布"

      - name: 提交发布审核
        id: publish
        run: |
          curl -s -D /tmp/publish_headers.txt -o /tmp/publish_body.txt \
            -H "Authorization: ApiKey $EDGE_API_KEY" \
            -H "X-ClientID: $EDGE_CLIENT_ID" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"notes\": \"Publish ${{ steps.version.outputs.tag }} via GitHub Actions\"}" \
            "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions"

          # 取最后一个 HTTP 状态行（跳过 100 Continue）
          HTTP_CODE=$(grep '^HTTP/' /tmp/publish_headers.txt | tail -1 | awk '{print $2}' | tr -d '\r')

          if [ "$HTTP_CODE" = "202" ]; then
            OPERATION_ID=$(grep -i "^Location:" /tmp/publish_headers.txt \
              | sed 's|.*operations/||' \
              | tr -d '\r\n[:space:]')
            echo "publish_op_id=$OPERATION_ID" >> $GITHUB_OUTPUT
            echo "发布已提交，operationID: $OPERATION_ID"
          else
            echo "::error::提交发布失败 HTTP $HTTP_CODE"
            cat /tmp/publish_body.txt
            exit 1
          fi

      - name: 等待发布审核结果
        run: |
          OPERATION_ID="${{ steps.publish.outputs.publish_op_id }}"

          if [ -z "$OPERATION_ID" ]; then
            echo "::warning::未获取到发布 operationID，跳过状态检查"
            exit 0
          fi

          MAX_RETRIES=20
          RETRY_INTERVAL=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "检查发布状态 ($i/$MAX_RETRIES)..."
            STATUS_RESPONSE=$(curl -s \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions/operations/$OPERATION_ID")

            echo "响应: $STATUS_RESPONSE"
            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // empty')
            echo "状态: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Edge Add-ons 发布成功"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "::warning::发布审核可能未通过，请检查 Partner Center"
              echo "详情: $STATUS_RESPONSE"
              exit 0
            fi

            sleep $RETRY_INTERVAL
          done

          echo "::warning::发布状态检查超时，请在 Partner Center 手动确认"
          exit 0
