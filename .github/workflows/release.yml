name: 构建与发布

on:
  push:
    branches:
      - main
    paths:
      - 'version.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建并发布浏览器扩展
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 创建发布目录并还原私钥
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          mkdir -p release
          if [ -n "$CRX_PRIVATE_KEY" ]; then
            echo -n "$CRX_PRIVATE_KEY" > release/moviepilot-tools.pem
            echo "Private key restored from secrets."
          else
            echo "No CRX_PRIVATE_KEY secret found. A new key will be auto-generated for CRX packaging."
          fi

      - name: 构建并打包扩展程序
        run: npm run build

      - name: 上传构建产物 (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: |
            release/*.zip
            release/*.crx

      - name: 生成版本更新说明
        id: release_notes
        run: |
          # 读取版本信息
          version=$(jq -r '.version' version.json)
          echo "Detected version from version.json: $version"
          echo "version=$version" >> $GITHUB_OUTPUT
          
          # 提取对应版本的更新说明（数组则逐行输出，字符串则直接输出）
          notes=$(jq -r --arg v "$version" '
            (.history["v"+$v] // .history[$v] // empty)
            | if type == "array" then .[] else . end
          ' version.json)
          
          if [ -z "$notes" ]; then
            notes="Release version $version"
          fi
          
          # 写入发布说明文件
          echo "$notes" > release_notes.md
          echo "Generated release notes:"
          echo "$notes"

      - name: 创建 GitHub Release 发布版本
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_notes.outputs.version }}
          name: MoviePilot Tools v${{ steps.release_notes.outputs.version }}
          body_path: release_notes.md
          files: |
            release/*.zip
            release/*.crx
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
