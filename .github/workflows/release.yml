name: 构建与发布

on:
  push:
    branches:
      - main
    paths:
      - 'version.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建并发布浏览器扩展
    runs-on: ubuntu-latest

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 创建发布目录并还原私钥
        env:
          CRX_PRIVATE_KEY: ${{ secrets.CRX_PRIVATE_KEY }}
        run: |
          mkdir -p release
          if [ -n "$CRX_PRIVATE_KEY" ]; then
            echo -n "$CRX_PRIVATE_KEY" > release/moviepilot-tools.pem
            echo "Private key restored from secrets."
          else
            echo "No CRX_PRIVATE_KEY secret found. A new key will be auto-generated for CRX packaging."
          fi

      - name: 构建并打包扩展程序
        run: npm run build

      - name: 上传构建产物 (GitHub Actions)
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: |
            release/*.zip
            release/*.crx

      - name: 生成版本更新说明
        id: release_notes
        run: |
          # 读取版本信息
          version=$(jq -r '.version' version.json)
          echo "Detected version from version.json: $version"
          echo "version=$version" >> $GITHUB_OUTPUT
          
          # 提取对应版本的更新说明（数组则逐行输出，字符串则直接输出）
          notes=$(jq -r --arg v "$version" '
            (.history["v"+$v] // .history[$v] // empty)
            | if type == "array" then .[] else . end
          ' version.json)
          
          if [ -z "$notes" ]; then
            notes="Release version $version"
          fi
          
          # 写入发布说明文件
          echo "$notes" > release_notes.md
          echo "Generated release notes:"
          echo "$notes"

      - name: 创建 GitHub Release 发布版本
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_notes.outputs.version }}
          name: MoviePilot Tools v${{ steps.release_notes.outputs.version }}
          body_path: release_notes.md
          files: |
            release/*.zip
            release/*.crx
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-edge:
    name: 发布至 Edge Add-ons 商店
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.result == 'success' }}
    env:
      EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
      EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}
      EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
      API_ENDPOINT: https://api.addons.microsoftedge.microsoft.com

    steps:
      - name: 检查 Edge API 凭据
        run: |
          if [ -z "$EDGE_CLIENT_ID" ] || [ -z "$EDGE_API_KEY" ] || [ -z "$EDGE_PRODUCT_ID" ]; then
            echo "::warning::Edge Add-ons API 凭据未配置，跳过发布"
            exit 0
          fi

      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: extension-build
          path: release

      - name: 上传扩展包至 Edge Add-ons
        id: upload
        run: |
          ZIP_FILE=$(ls release/*.zip | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::未找到 .zip 包"
            exit 1
          fi
          echo "上传文件: $ZIP_FILE"

          curl -s -D /tmp/upload_headers.txt -o /tmp/upload_body.txt \
            -H "Authorization: ApiKey $EDGE_API_KEY" \
            -H "X-ClientID: $EDGE_CLIENT_ID" \
            -H "Content-Type: application/zip" \
            -X POST \
            -T "$ZIP_FILE" \
            "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions/draft/package"

          HTTP_CODE=$(head -1 /tmp/upload_headers.txt | awk '{print $2}' | tr -d '\r')
          echo "HTTP 状态码: $HTTP_CODE"

          if [ "$HTTP_CODE" = "202" ]; then
            OPERATION_ID=$(grep -i "^Location:" /tmp/upload_headers.txt \
              | sed 's|.*operations/||' \
              | tr -d '\r\n[:space:]')

            if [ -z "$OPERATION_ID" ]; then
              echo "::error::上传成功但未获取到 operationID"
              cat /tmp/upload_headers.txt
              exit 1
            fi
            echo "operation_id=$OPERATION_ID" >> $GITHUB_OUTPUT
            echo "上传已接受，operationID: $OPERATION_ID"
          else
            echo "::error::上传失败 HTTP $HTTP_CODE"
            cat /tmp/upload_body.txt
            exit 1
          fi

      - name: 等待上传处理完成
        run: |
          OPERATION_ID="${{ steps.upload.outputs.operation_id }}"
          MAX_RETRIES=20
          RETRY_INTERVAL=5

          for i in $(seq 1 $MAX_RETRIES); do
            echo "检查上传状态 ($i/$MAX_RETRIES)..."
            STATUS_RESPONSE=$(curl -s \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions/draft/package/operations/$OPERATION_ID")

            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // empty')
            echo "状态: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "上传处理完成"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "::error::上传处理失败: $STATUS_RESPONSE"
              exit 1
            fi

            sleep $RETRY_INTERVAL
          done

          echo "::error::上传处理超时"
          exit 1

      - name: 提交发布审核
        id: publish
        run: |
          VERSION=$(jq -r '.version' version.json 2>/dev/null || echo "unknown")

          curl -s -D /tmp/publish_headers.txt -o /tmp/publish_body.txt \
            -H "Authorization: ApiKey $EDGE_API_KEY" \
            -H "X-ClientID: $EDGE_CLIENT_ID" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "{\"notes\": \"Auto-publish v$VERSION via GitHub Actions\"}" \
            "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions"

          HTTP_CODE=$(head -1 /tmp/publish_headers.txt | awk '{print $2}' | tr -d '\r')

          if [ "$HTTP_CODE" = "202" ]; then
            OPERATION_ID=$(grep -i "^Location:" /tmp/publish_headers.txt \
              | sed 's|.*operations/||' \
              | tr -d '\r\n[:space:]')
            echo "publish_op_id=$OPERATION_ID" >> $GITHUB_OUTPUT
            echo "发布已提交，operationID: $OPERATION_ID"
          else
            echo "::error::提交发布失败 HTTP $HTTP_CODE"
            cat /tmp/publish_body.txt
            exit 1
          fi

      - name: 等待发布审核结果
        run: |
          OPERATION_ID="${{ steps.publish.outputs.publish_op_id }}"
          MAX_RETRIES=20
          RETRY_INTERVAL=10

          for i in $(seq 1 $MAX_RETRIES); do
            echo "检查发布状态 ($i/$MAX_RETRIES)..."
            STATUS_RESPONSE=$(curl -s \
              -H "Authorization: ApiKey $EDGE_API_KEY" \
              -H "X-ClientID: $EDGE_CLIENT_ID" \
              "$API_ENDPOINT/v1/products/$EDGE_PRODUCT_ID/submissions/operations/$OPERATION_ID")

            STATUS=$(echo "$STATUS_RESPONSE" | jq -r '.status // empty')
            echo "状态: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              echo "✅ Edge Add-ons 发布成功"
              exit 0
            elif [ "$STATUS" = "Failed" ]; then
              echo "::warning::发布审核可能未通过（常见于首次提交），请检查 Partner Center"
              echo "详情: $STATUS_RESPONSE"
              exit 0
            fi

            sleep $RETRY_INTERVAL
          done

          echo "::warning::发布状态检查超时，请在 Partner Center 手动确认"
          exit 0
